# NextOS-Elite-Edition: silencia register-dumps do kernel 3.14 quando
# userspace moderno (glibc novo, systemd, sshd) chama syscalls que nao
# existem nesse kernel. Os syscalls ainda retornam -ENOSYS para userspace
# (que normalmente faz fallback) — so para de poluir o journal com dumps
# de registradores aarch64 a cada chamada. Top offenders observados:
#   syscall 291 (statx, Linux 4.11+)
#   syscall 293 (rseq, Linux 4.18+)
#   syscall 434 (pidfd_open, Linux 5.3+)
#   syscall 436 (close_range, Linux 5.9+)
#   syscall 439 (faccessat2, Linux 5.8+)
debug.exception-trace = 0
